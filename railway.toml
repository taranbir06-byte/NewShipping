[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install && npm rebuild better-sqlite3"

[deploy]
startCommand = "cd backend && node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
